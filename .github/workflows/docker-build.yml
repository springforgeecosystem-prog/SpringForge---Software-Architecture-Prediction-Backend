name: Build and Push Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: docker-build
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set image tag
        id: vars
        run: echo "TAG=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: |
          docker build \
          --cache-from=${{ secrets.ACR_LOGIN_SERVER }}/codegeneration-backend:latest \
          -t ${{ secrets.ACR_LOGIN_SERVER }}/codegeneration-backend:latest \
          -t ${{ secrets.ACR_LOGIN_SERVER }}/codegeneration-backend:${{ steps.vars.outputs.TAG }} \
          .

      - name: Push Docker images
        run: |
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/codegeneration-backend:latest
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/codegeneration-backend:${{ steps.vars.outputs.TAG }}
